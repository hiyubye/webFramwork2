<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 등록</title>


</head>

<body>
    <header>
        <p th:text="${'실습 수행 일시: '
        + #temporals.format(#temporals.createNow(), 'yyyy년-MM월-dd일 (E) a HH:mm:ss')
        + ' | 학번: 2171107 | 성명: 김도윤 '}">
        </p>
    </header>
    <h1>카테고리 등록 폼</h1>

    <form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
        <input type="text" th:field="*{name}" placeholder="카테고리 이름" />
        <span th:errors="*{name}" style="color:red"></span>
        <button type="submit">등록</button>

    </form>

</body>

</html>
